naftiko: 1.0.0-alpha2
info:
  label: GoToWebinar REST API — Panelists
  description: GoToWebinar REST API — Panelists. Manage panelists for a webinar.
  tags:
    - GoToWebinar
    - Panelists
  created: '2026-05-23'
  modified: '2026-05-23'
binds:
  - namespace: env
    keys:
      GOTO_ACCESS_TOKEN: GOTO_ACCESS_TOKEN
      GOTO_ORGANIZER_KEY: GOTO_ORGANIZER_KEY
capability:
  consumes:
    - type: http
      namespace: gotowebinar-panelists
      baseUri: https://api.getgo.com/G2W/rest/v2
      auth:
        type: bearer
        token: $env.GOTO_ACCESS_TOKEN
      resources:
        - name: panelists
          path: /organizers/{organizerKey}/webinars/{webinarKey}/panelists
          operations:
            - name: listPanelists
              method: GET
              description: List panelists for a webinar.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: $.
              inputParameters:
                - name: organizerKey
                  in: path
                  type: string
                  required: true
                  value: $env.GOTO_ORGANIZER_KEY
                - name: webinarKey
                  in: path
                  type: string
                  required: true
            - name: createPanelists
              method: POST
              description: Invite one or more panelists to a webinar.
              outputRawFormat: json
              inputParameters:
                - name: organizerKey
                  in: path
                  type: string
                  required: true
                  value: $env.GOTO_ORGANIZER_KEY
                - name: webinarKey
                  in: path
                  type: string
                  required: true
                - name: body
                  in: body
                  type: array
                  required: true
                  description: Array of panelist objects (name, email).
