naftiko: 1.0.0-alpha2
info:
  label: GoToWebinar REST API — Webinars
  description: GoToWebinar REST API — Webinars. 5 operations. Lead operation: createWebinar. Self-contained Naftiko capability covering create, read, update, list, and cancel of webinars under a GoTo organizer.
  tags:
    - GoToWebinar
    - Webinars
  created: '2026-05-23'
  modified: '2026-05-23'
binds:
  - namespace: env
    keys:
      GOTO_ACCESS_TOKEN: GOTO_ACCESS_TOKEN
      GOTO_ORGANIZER_KEY: GOTO_ORGANIZER_KEY
capability:
  consumes:
    - type: http
      namespace: gotowebinar-webinars
      baseUri: https://api.getgo.com/G2W/rest/v2
      description: GoToWebinar V2 Webinars capability. Self-contained, no shared references.
      auth:
        type: bearer
        token: $env.GOTO_ACCESS_TOKEN
      resources:
        - name: list-webinars
          path: /organizers/{organizerKey}/webinars
          operations:
            - name: getWebinars
              method: GET
              description: List webinars for an organizer within a time range.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: $.
              inputParameters:
                - name: organizerKey
                  in: path
                  type: string
                  required: true
                  value: $env.GOTO_ORGANIZER_KEY
                - name: fromTime
                  in: query
                  type: string
                  required: true
                - name: toTime
                  in: query
                  type: string
                  required: true
        - name: create-webinar
          path: /organizers/{organizerKey}/webinars
          operations:
            - name: createWebinar
              method: POST
              description: Create a webinar for an organizer.
              outputRawFormat: json
              outputParameters:
                - name: webinarKey
                  type: string
                  value: $.webinarKey
              inputParameters:
                - name: organizerKey
                  in: path
                  type: string
                  required: true
                  value: $env.GOTO_ORGANIZER_KEY
                - name: body
                  in: body
                  type: object
                  required: true
                  description: Webinar payload (subject, times, timeZone, type, experienceType).
        - name: get-webinar
          path: /organizers/{organizerKey}/webinars/{webinarKey}
          operations:
            - name: getWebinar
              method: GET
              description: Get a single webinar.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: organizerKey
                  in: path
                  type: string
                  required: true
                  value: $env.GOTO_ORGANIZER_KEY
                - name: webinarKey
                  in: path
                  type: string
                  required: true
        - name: update-webinar
          path: /organizers/{organizerKey}/webinars/{webinarKey}
          operations:
            - name: updateWebinar
              method: PUT
              description: Update an existing webinar.
              outputRawFormat: json
              inputParameters:
                - name: organizerKey
                  in: path
                  type: string
                  required: true
                  value: $env.GOTO_ORGANIZER_KEY
                - name: webinarKey
                  in: path
                  type: string
                  required: true
                - name: body
                  in: body
                  type: object
                  required: true
        - name: cancel-webinar
          path: /organizers/{organizerKey}/webinars/{webinarKey}
          operations:
            - name: cancelWebinar
              method: DELETE
              description: Cancel a webinar (use deleteAll=true to wipe all past sessions of a recurring webinar).
              outputRawFormat: json
              inputParameters:
                - name: organizerKey
                  in: path
                  type: string
                  required: true
                  value: $env.GOTO_ORGANIZER_KEY
                - name: webinarKey
                  in: path
                  type: string
                  required: true
                - name: deleteAll
                  in: query
                  type: boolean
                  required: false
